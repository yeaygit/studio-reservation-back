server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: studio-reservation-java
  profiles:
    default: local

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        default_schema: studio
        format_sql: true

app:
  jwt:
    issuer: studio-reservation-back
    secret: ENC(CU9HCCa+v0pm3DKsbT4+xQP5/nMyUWC7xx4ocdwt18ZePps8j1Q5nlVxJsNPJ89bxQOI3bsTqRq46O7qrwTODXBxyZgmxeptzfvak2Y+b3U=)
    access-token-expiration: 30m
    refresh-token-expiration: 14d
  auth:
    refresh-cookie:
      secure: true
      same-site: Lax
      path: ${server.servlet.context-path:}/auth

jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:yulim-toy-project}

logging:
  level:
    root: info